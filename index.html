<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>神庙逃亡 - Temple Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3e 50%, #2c3e50 100%);
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.3);
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .score-panel {
            position: absolute;
            top: 2%;
            left: 3%;
            color: #FFD700;
            font-size: clamp(14px, 3vw, 24px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .highscore-panel {
            position: absolute;
            top: 2%;
            right: 3%;
            color: #fff;
            font-size: clamp(12px, 2.5vw, 18px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .controls-hint {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: clamp(10px, 1.8vw, 14px);
            white-space: nowrap;
        }
        /* 手机端隐藏键盘提示，改为触控提示 */
        @media (max-width: 768px) {
            .controls-hint { display: none; }
        }
        .powerup-indicator {
            position: absolute;
            top: 12%;
            left: 3%;
            color: #00FF00;
            font-size: clamp(13px, 2.5vw, 20px);
            text-shadow: 0 0 10px #00FF00;
        }
        .invincible-btn {
            position: absolute;
            top: clamp(50px, 9%, 90px);
            right: 3%;
            padding: clamp(6px, 1.5vw, 10px) clamp(10px, 2.5vw, 18px);
            font-size: clamp(12px, 2vw, 16px);
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #444 0%, #222 100%);
            border: 2px solid #666;
            border-radius: 25px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .invincible-btn:hover {
            background: linear-gradient(135deg, #555 0%, #333 100%);
            border-color: #888;
            transform: scale(1.05);
        }
        .invincible-btn.active {
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
            border-color: #FFD700;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 140, 0, 0.4);
            animation: invinciblePulse 1s ease-in-out infinite;
        }
        @keyframes invinciblePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 140, 0, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 140, 0, 0.6); }
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            pointer-events: auto;
        }
        #startScreen h1 {
            font-size: clamp(32px, 9vw, 72px);
            color: #FFD700;
            text-shadow: 0 0 20px #FFD700, 0 0 40px #FF8C00;
            margin-bottom: 3%;
            letter-spacing: 4px;
        }
        #startScreen .subtitle {
            font-size: clamp(14px, 4vw, 24px);
            color: #8B4513;
            margin-bottom: 5%;
        }
        #startScreen .start-hint {
            font-size: clamp(14px, 4vw, 28px);
            color: #fff;
            animation: pulse 1.5s ease-in-out infinite;
        }
        #startScreen .controls-hint {
            margin-top: 20px;
            padding: 20px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        #startScreen .controls-hint .hint-title {
            font-size: clamp(14px, 3vw, 20px);
            color: #FFD700;
            margin-bottom: 12px;
            text-align: center;
        }
        #startScreen .controls-hint .key-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 8px 0;
        }
        #startScreen .controls-hint .key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
            height: 45px;
            padding: 0 12px;
            background: linear-gradient(180deg, #444 0%, #222 100%);
            border: 2px solid #666;
            border-radius: 8px;
            color: #fff;
            font-size: clamp(12px, 2.5vw, 16px);
            font-weight: bold;
            box-shadow: 0 3px 0 #111, 0 4px 6px rgba(0,0,0,0.3);
        }
        #startScreen .controls-hint .key-label {
            color: #aaa;
            font-size: clamp(11px, 2vw, 14px);
        }
        @media (hover: hover) and (pointer: fine) {
            #startScreen .controls-hint {
                display: block;
            }
            #startScreen .mobile-hint {
                display: none;
            }
        }
        @media (hover: none), (pointer: coarse) {
            #startScreen .controls-hint {
                display: none;
            }
            #startScreen .mobile-hint {
                display: block;
            }
        }
        #gameOverScreen h2 {
            font-size: clamp(26px, 8vw, 56px);
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 4%;
        }
        #gameOverScreen .final-score {
            font-size: clamp(18px, 5vw, 36px);
            color: #FFD700;
            margin-bottom: 3%;
        }
        #gameOverScreen .new-record {
            font-size: clamp(14px, 4vw, 28px);
            color: #00ff00;
            margin-bottom: 4%;
            animation: pulse 0.5s ease-in-out infinite;
        }
        #gameOverScreen .restart-hint {
            font-size: clamp(12px, 3.5vw, 24px);
            color: #fff;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .hidden {
            display: none !important;
        }
        .powerup-indicator {
            position: absolute;
            top: 60px;
            left: 20px;
            color: #00FF00;
            font-size: 20px;
            text-shadow: 0 0 10px #00FF00;
        }
        .magnet-indicator {
            position: absolute;
            top: 18%;
            left: 3%;
            color: #FF6699;
            font-size: clamp(13px, 2.5vw, 20px);
            text-shadow: 0 0 10px #FF6699;
            animation: magnetPulse 0.5s ease-in-out infinite;
        }
        @keyframes magnetPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        #pauseOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(28px, 7vw, 48px);
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        .lives-panel {
            position: absolute;
            top: 7%;
            left: 3%;
            color: #ff4444;
            font-size: clamp(14px, 3vw, 24px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .screen-shake {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px) translateY(5px); }
            40% { transform: translateX(10px) translateY(-5px); }
            60% { transform: translateX(-5px) translateY(3px); }
            80% { transform: translateX(5px) translateY(-3px); }
        }
        .damage-flash {
            animation: damageFlash 0.5s ease-out;
        }
        @keyframes damageFlash {
            0% { filter: brightness(1) sepia(0); }
            50% { filter: brightness(2) sepia(1) hue-rotate(-50deg); }
            100% { filter: brightness(1) sepia(0); }
        }
        /* ========== 移动端触控按钮 ========== */
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 22%;
            pointer-events: none;
            z-index: 50;
        }
        @media (max-width: 1024px) {
            #mobileControls { display: flex; }
        }
        /* 强制手机竖屏也显示 */
        @media (hover: none) and (pointer: coarse) {
            #mobileControls { display: flex; }
        }
        .mobile-btn-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        .mobile-btn {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: rgba(255,255,255,0.8);
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(4px);
            transition: background 0.1s, transform 0.1s;
            cursor: pointer;
        }
        .mobile-btn:active, .mobile-btn.pressed {
            background: rgba(255,255,255,0.28);
            transform: scale(0.92);
        }
        /* 暂停按钮单独样式 */
        #mobilePauseBtn {
            position: absolute;
            bottom: 24%;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            font-size: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
            z-index: 51;
            color: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
        }
        @media (max-width: 1024px) {
            #mobilePauseBtn { display: flex; }
        }
        @media (hover: none) and (pointer: coarse) {
            #mobilePauseBtn { display: flex; }
        }
        /* 竖屏优化 */
        @media (orientation: portrait) {
            .mobile-btn {
                width: min(18vw, 80px);
                height: min(18vw, 80px);
                font-size: min(7vw, 32px);
            }
            #mobileControls { height: 18%; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="score-panel">
            <div>分数: <span id="scoreDisplay">0</span></div>
        </div>
        <div class="lives-panel" id="livesPanel">
            <span id="livesDisplay">❤️❤️❤️</span>
        </div>
        <div class="highscore-panel">
            <div>最高分: <span id="highScoreDisplay">0</span></div>
        </div>
        <div class="powerup-indicator hidden" id="powerupIndicator">
            ⚡ 无敌时间 ⚡
        </div>
        <div class="magnet-indicator hidden" id="magnetIndicator">
            🧲 吸金币 🧲
        </div>
        <div class="controls-hint" id="controlsHint">
            ← A 键向左移动 | D 键向右移动 → | P 键暂停 | U 键无敌
        </div>
        <button class="invincible-btn" id="invincibleBtn" onclick="togglePermInvincible()">🛡️ 无敌模式</button>
        <div id="pauseOverlay" class="hidden">⏸️ 游戏暂停</div>
        
        <!-- 移动端触控按钮 -->
        <div id="mobileControls">
            <div class="mobile-btn-area">
                <div class="mobile-btn" id="mobileLeft">◀</div>
            </div>
            <div class="mobile-btn-area" style="flex:0.5;"></div>
            <div class="mobile-btn-area">
                <div class="mobile-btn" id="mobileRight">▶</div>
            </div>
        </div>
        <div id="mobilePauseBtn">⏸</div>
        
        <div id="startScreen" onclick="startGame()">
            <h1>🏛️ 神庙逃亡</h1>
            <div class="subtitle">Temple Runner</div>
            <div class="start-hint">点击屏幕 或 按 空格键 开始</div>
            <div class="controls-hint">
                <div class="hint-title">⌨️ 按键说明</div>
                <div class="key-row">
                    <span class="key">←</span>
                    <span class="key">→</span>
                    <span class="key-label">左右移动 / A D 键</span>
                </div>
                <div class="key-row">
                    <span class="key">空格</span>
                    <span class="key-label">开始 / 跳跃</span>
                </div>
                <div class="key-row">
                    <span class="key">ESC</span>
                    <span class="key-label">暂停游戏</span>
                </div>
            </div>
            <div class="mobile-hint" style="display:none; margin-top:15px; color:#888; font-size:14px;">
                📱 手机端：滑动屏幕左右移动，点击按钮操作
            </div>
        </div>
        
        <div id="gameOverScreen" class="hidden" onclick="startGame()">
            <h2>💀 游戏结束 💀</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <div class="new-record hidden" id="newRecord">🎉 新纪录! 🎉</div>
            <div class="restart-hint">点击屏幕 或 按 空格键 重新开始</div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            lanes: 3,
            initialSpeed: 12,
            maxSpeed: 22,
            speedIncrement: 0.002,
            obstacleSpawnInterval: [80, 140],
            coinSpawnInterval: [25, 50],
            powerupSpawnInterval: [500, 800],
            powerupDuration: 3000,
            magnetDuration: 8000,
            laneWidth: 180,
            trackLength: 2000,
            horizonY: 0.12,
            playerY: 0.80,
            collisionRadius: 25,
            maxLives: 3,
            invincibilityDuration: 1500,
            jumpHeight: 130,
            jumpDuration: 32
        };

        // ==================== 障碍物类型 ====================
        const OBSTACLE_TYPES = [
            { name: 'pillar', width: 1, height: 2, color: '#5a4a3a', damage: 1 },
            { name: 'low_wall', width: 1, height: 0.8, color: '#8B4513', damage: 1 },
            { name: 'tall_pillar', width: 0.8, height: 3, color: '#4a3a2a', damage: 1 },
            { name: 'double_pillar', width: 1.5, height: 2.2, color: '#6b5a4a', damage: 1 },
            { name: 'spike', width: 0.6, height: 1.5, color: '#666', damage: 2 },
            { name: 'rock', width: 1.2, height: 1, color: '#7a6a5a', damage: 1, canJumpOver: true },
            { name: 'small_rock', width: 0.8, height: 0.5, color: '#6a5a4a', damage: 1, canJumpOver: true },
            { name: 'box', width: 1, height: 0.8, color: '#8B4513', damage: 1, canJumpOver: true },
            { name: 'train', width: 1.8, height: 1.5, color: '#2c3e50', damage: 1 },
            { name: 'train_engine', width: 2, height: 2, color: '#1a252f', damage: 1 },
            // 新增精美障碍物
            { name: 'neon_tower', width: 0.8, height: 2.5, color: '#1a1a2e', damage: 1 },  // 霓虹灯塔
            { name: 'water_puddle', width: 1.2, height: 0.3, color: '#3498db', damage: 1, canJumpOver: true },  // 水坑
            { name: 'warning_sign', width: 0.6, height: 1.8, color: '#f39c12', damage: 1 },  // 警示牌
            { name: 'fire_barrel', width: 0.7, height: 1.2, color: '#e74c3c', damage: 1 },  // 燃烧桶
            { name: 'laser_gate', width: 1.5, height: 2, color: '#e74c3c', damage: 1 },  // 激光门
            { name: 'crystal', width: 0.8, height: 1.5, color: '#9b59b6', damage: 1 }  // 水晶簇
        ];

        // ==================== 游戏状态 ====================
        const game = {
            state: 'start',
            score: 0,
            highScore: parseInt(localStorage.getItem('templeRunnerHighScore')) || 0,
            speed: CONFIG.initialSpeed,
            playerLane: 1,
            targetLane: 1,
            obstacles: [],
            coins: [],
            powerups: [],
            particles: [],
            deathParticles: [],
            dustParticles: [],       // 跑步尘土粒子
            meteorParticles: [],     // 流星粒子
            lastObstacleSpawn: 0,
            lastCoinSpawn: 0,
            lastPowerupSpawn: 0,
            nextObstacleSpawn: 60,
            nextCoinSpawn: 30,
            nextPowerupSpawn: 300,
            powerupEndTime: 0,
            isInvincible: false,
            isPermInvincible: false,  // 永久无敌开关
            isMagnetActive: false,
            magnetEndTime: 0,
            speedLevel: 0,          // 当前速度等级（每2000积分升一级）
            speedBoostFlash: 0,      // 速度提升时的闪烁计时器
            isHurt: false,
            hurtEndTime: 0,
            frameCount: 0,
            lives: CONFIG.maxLives,
            isDying: false,
            deathTimer: 0,
            isJumping: false,
            jumpFrame: 0,
            jumpHeight: 0
        };

        // ==================== Canvas 设置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resizeCanvas() {
            const ratio = 16 / 9;
            let w = window.innerWidth;
            let h = window.innerHeight;
            
            // 检测是否为手机竖屏
            const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || 
                             (window.innerWidth <= 768);
            const isPortrait = h > w;
            
            if (isPortrait && isMobile) {
                // 竖屏手机：宽度填满，高度按比例（留底部操作区）
                w = window.innerWidth;
                h = w / ratio;
                // 如果高度超出屏幕，则以屏幕高度*0.75为准（留操作区）
                const maxH = window.innerHeight * 0.78;
                if (h > maxH) {
                    h = maxH;
                    w = h * ratio;
                }
            } else {
                // 横屏或PC：保持16:9，适配窗口
                if (w / h > ratio) {
                    w = h * ratio;
                } else {
                    h = w / ratio;
                }
            }
            
            canvas.width = Math.min(1600, Math.round(w));
            canvas.height = Math.round(canvas.width / ratio);
            width = canvas.width;
            height = canvas.height;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Canvas 点击开始游戏
        canvas.addEventListener('click', () => {
            if (game.state === 'start' || game.state === 'gameover') {
                startGame();
            }
        });

        // ==================== 3D 透视投影 ====================
        function project(z, x, lane) {
            const horizonY = height * CONFIG.horizonY;
            const playerY = height * CONFIG.playerY;
            // 增强透视效果：z值越大物体越小得越快
            const scale = 1 / (1 + z * 0.002);
            const centerX = width / 2;
            // 修正：车道相对于玩家位置计算偏移
            const laneOffset = (lane - game.playerLane) * CONFIG.laneWidth * scale;
            
            return {
                x: centerX + laneOffset,
                y: horizonY + (playerY - horizonY) * scale,
                scale: scale
            };
        }

        // ==================== 绘制函数 ====================
        function drawTrack() {
            // 绘制背景装饰 - 地铁隧道墙壁
            drawTemplePillars();

            // 绘制跑道地面（地铁轨道风格）
            const horizonY = height * CONFIG.horizonY;
            const playerY = height * CONFIG.playerY;

            // 地面底色
            const groundGrad = ctx.createLinearGradient(0, horizonY, 0, playerY + 50);
            groundGrad.addColorStop(0, '#1a1a2e');
            groundGrad.addColorStop(0.5, '#2c3e50');
            groundGrad.addColorStop(1, '#34495e');

            // 左右铁轨区域
            const leftRailX = width * 0.06;
            const rightRailX = width * 0.94;
            ctx.fillStyle = groundGrad;
            ctx.fillRect(leftRailX, horizonY, rightRailX - leftRailX, playerY - horizonY + 100);

            // 绘制透视网格（铁轨枕木效果，滚动加快）
            const tieOffset = (game.frameCount * game.speed * 3) % 80;
            for (let z = -tieOffset; z < CONFIG.trackLength; z += 80) {
                const proj = project(z, 0, 0);
                const projRight = project(z, 0, 3);
                if (proj.y > horizonY && proj.y < playerY + 100) {
                    // 枕木（横向枕木条）
                    const tieGrad = ctx.createLinearGradient(
                        proj.x, proj.y,
                        projRight.x, proj.y
                    );
                    tieGrad.addColorStop(0, '#5D4E37');
                    tieGrad.addColorStop(0.3, '#7B6B4F');
                    tieGrad.addColorStop(0.7, '#7B6B4F');
                    tieGrad.addColorStop(1, '#5D4E37');
                    ctx.fillStyle = tieGrad;
                    ctx.fillRect(proj.x, proj.y - 3 * proj.scale, projRight.x - proj.x, 6 * proj.scale);
                }
            }

            // 绘制铁轨（左右两条）
            for (let lane = 0; lane < 3; lane++) {
                drawLane(lane);
            }

            // 绘制分界线
            drawLaneDividers();
        }

        function drawTemplePillars() {
            const horizonY = height * CONFIG.horizonY;

            // 绘制地铁隧道墙壁（左右两侧），滚动速度加快
            for (let i = 0; i < 8; i++) {
                const z = (game.frameCount * game.speed * 0.5 + i * 300) % CONFIG.trackLength;
                const scale = 1 / (1 + z * 0.003);

                // 左侧墙壁
                drawTunnelWall(width * 0.06, horizonY, scale, 'left');
                // 右侧墙壁
                drawTunnelWall(width * 0.94, horizonY, scale, 'right');
            }
        }

        function drawTunnelWall(x, horizonY, scale, side) {
            const wallHeight = 300 * scale;
            const wallWidth = 60 * scale;
            const dir = side === 'left' ? 1 : -1;
            const wx = side === 'left' ? x : x;

            // 墙壁主体 - 混凝土质感
            const wGrad = ctx.createLinearGradient(
                side === 'left' ? wx : wx - wallWidth,
                horizonY,
                side === 'left' ? wx + wallWidth : wx,
                horizonY
            );
            wGrad.addColorStop(0, '#2c3e50');
            wGrad.addColorStop(0.5, '#34495e');
            wGrad.addColorStop(1, '#2c3e50');
            ctx.fillStyle = wGrad;
            ctx.fillRect(side === 'left' ? wx : wx - wallWidth, horizonY - wallHeight, wallWidth, wallHeight + 200);

            // 墙壁边缘高光
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            if (side === 'left') {
                ctx.fillRect(wx, horizonY - wallHeight, wallWidth * 0.3, wallHeight + 200);
            } else {
                ctx.fillRect(wx - wallWidth, horizonY - wallHeight, wallWidth * 0.3, wallHeight + 200);
            }

            // 墙壁砖块纹理
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1;
            for (let row = 0; row < 6; row++) {
                const rowY = horizonY - wallHeight + row * (wallHeight / 5);
                ctx.beginPath();
                ctx.moveTo(side === 'left' ? wx : wx - wallWidth, rowY);
                ctx.lineTo(side === 'left' ? wx + wallWidth : wx, rowY);
                ctx.stroke();
            }

            // 霓虹灯管（随机颜色装饰）
            if (Math.floor(scale * 10) % 3 === 0) {
                const neonColors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
                const neonColor = neonColors[Math.floor(scale * 100) % neonColors.length];
                ctx.fillStyle = neonColor;
                ctx.shadowColor = neonColor;
                ctx.shadowBlur = 8 * scale;
                ctx.fillRect(
                    side === 'left' ? wx + wallWidth * 0.3 : wx - wallWidth * 0.8,
                    horizonY - wallHeight * 0.4,
                    wallWidth * 0.4,
                    wallWidth * 0.15
                );
                ctx.shadowBlur = 0;
            }

            // 地铁广告牌
            if (scale > 0.4) {
                const adW = wallWidth * 0.7;
                const adH = wallWidth * 0.5;
                const adX = side === 'left' ? wx + wallWidth * 0.15 : wx - wallWidth * 0.85;
                const adY = horizonY - wallHeight * 0.7;

                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(adX, adY, adW, adH);
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 1.5 * scale;
                ctx.strokeRect(adX, adY, adW, adH);

                // 广告内容
                ctx.fillStyle = '#e74c3c';
                ctx.font = `${8 * scale}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('SUBWAY', adX + adW / 2, adY + adH * 0.4);
                ctx.fillStyle = '#fff';
                ctx.fillText('RUN!', adX + adW / 2, adY + adH * 0.7);
            }
        }

        function drawPillar(x, baseY, scale, color) {
            const pillarHeight = 200 * scale;
            const pillarWidth = 40 * scale;

            ctx.fillStyle = color;
            ctx.fillRect(x - pillarWidth/2, baseY - pillarHeight, pillarWidth, pillarHeight);

            ctx.fillStyle = '#6b4423';
            ctx.fillRect(x - pillarWidth * 0.7, baseY - pillarHeight - 20 * scale, pillarWidth * 1.4, 20 * scale);

            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            for (let j = 0; j < 5; j++) {
                const y = baseY - pillarHeight * (j + 1) / 6;
                ctx.beginPath();
                ctx.moveTo(x - pillarWidth/2, y);
                ctx.lineTo(x + pillarWidth/2, y);
                ctx.stroke();
            }
        }

        function drawLane(lane) {
            const horizonY = height * CONFIG.horizonY;
            const playerY = height * CONFIG.playerY;

            // 地铁轨道区域渐变
            const gradient = ctx.createLinearGradient(0, horizonY, 0, playerY);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.4, '#2c3e50');
            gradient.addColorStop(1, '#34495e');

            ctx.fillStyle = gradient;

            const nearZ = 0;
            const farZ = CONFIG.trackLength;

            const nearLeft = project(nearZ, 0, lane - 0.5);
            const nearRight = project(nearZ, 0, lane + 0.5);
            const farLeft = project(farZ, 0, lane - 0.5);
            const farRight = project(farZ, 0, lane + 0.5);

            ctx.beginPath();
            ctx.moveTo(nearLeft.x, playerY);
            ctx.lineTo(nearRight.x, playerY);
            ctx.lineTo(farRight.x, farRight.y);
            ctx.lineTo(farLeft.x, farLeft.y);
            ctx.closePath();
            ctx.fill();
        }

        function drawLaneDividers() {
            const horizonY = height * CONFIG.horizonY;
            const playerY = height * CONFIG.playerY;
            const playerLaneRounded = Math.round(game.playerLane);

            // 黄色虚线车道分隔线
            ctx.setLineDash([12, 8]);
            ctx.strokeStyle = 'rgba(241, 196, 15, 0.5)';
            ctx.lineWidth = 2;

            for (let lane = 0; lane < 2; lane++) {
                ctx.beginPath();
                const near = project(0, 0, lane + 0.5);
                ctx.moveTo(near.x, playerY);
                for (let z = 50; z <= CONFIG.trackLength; z += 50) {
                    const proj = project(z, 0, lane + 0.5);
                    if (proj.y > horizonY) {
                        ctx.lineTo(proj.x, proj.y);
                    }
                }
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // 玩家所在车道的边缘线（白色高亮）
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2.5;

            // 左边缘
            ctx.beginPath();
            const leftNear = project(0, 0, playerLaneRounded - 0.5);
            ctx.moveTo(leftNear.x, playerY);
            for (let z = 50; z <= CONFIG.trackLength; z += 50) {
                const proj = project(z, 0, playerLaneRounded - 0.5);
                if (proj.y > horizonY) {
                    ctx.lineTo(proj.x, proj.y);
                }
            }
            ctx.stroke();

            // 右边缘
            ctx.beginPath();
            const rightNear = project(0, 0, playerLaneRounded + 0.5);
            ctx.moveTo(rightNear.x, playerY);
            for (let z = 50; z <= CONFIG.trackLength; z += 50) {
                const proj = project(z, 0, playerLaneRounded + 0.5);
                if (proj.y > horizonY) {
                    ctx.lineTo(proj.x, proj.y);
                }
            }
            ctx.stroke();
        }

        function drawPlayer() {
            // 玩家始终在屏幕中心，地铁跑酷风格角色 - 精美版
            const x = width / 2;
            const baseY = height * CONFIG.playerY;
            const y = baseY - game.jumpHeight;
            const size = 42;

            // 受伤闪烁
            if (game.isHurt && Math.floor(game.frameCount / 3) % 2 === 0) {
                ctx.globalAlpha = 0.3;
            }

            // 跑步节奏（跑动时腿部左右摆动，频率和幅度随速度提升）
            const speedRatio = game.speed / CONFIG.maxSpeed;
            const runFreq = 0.35 + speedRatio * 0.35;
            const runCycle = Math.sin(game.frameCount * runFreq) * (14 + speedRatio * 6);

            // 角色主体颜色
            let jacketColor = '#00B4D8';
            let pantsColor = '#1a1a2e';
            let skinColor = '#F4A460';
            let jacketHighlight = '#5dd3f3';
            if (game.isInvincible) {
                const glow = Math.sin(game.frameCount * 0.4) * 0.4 + 0.6;
                jacketColor = `rgba(0, 255, 136, ${glow})`;
                jacketHighlight = `rgba(150, 255, 200, ${glow})`;
                skinColor = `rgba(0, 255, 136, ${glow})`;
            } else if (game.isHurt) {
                jacketColor = '#ff4444';
                jacketHighlight = '#ff8888';
            }

            // 阴影 - 精美渐变阴影
            const shadowGrad = ctx.createRadialGradient(x, baseY + 8, 0, x, baseY + 8, size * 1.1);
            shadowGrad.addColorStop(0, 'rgba(0,0,0,0.4)');
            shadowGrad.addColorStop(0.5, 'rgba(0,0,0,0.2)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath();
            ctx.ellipse(x, baseY + 8, size * 1.0, size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();

            // === 背包（在身体后方）- 精美渐变 ===
            const bagGrad = ctx.createLinearGradient(x + size * 0.15, y - size * 0.85, x + size * 0.6, y - size * 0.15);
            bagGrad.addColorStop(0, '#f39c12');
            bagGrad.addColorStop(0.5, '#e67e22');
            bagGrad.addColorStop(1, '#d35400');
            ctx.fillStyle = bagGrad;
            ctx.beginPath();
            ctx.roundRect(x + size * 0.15, y - size * 0.85, size * 0.45, size * 0.7, 6);
            ctx.fill();
            // 背包高光
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.roundRect(x + size * 0.18, y - size * 0.82, size * 0.15, size * 0.4, 3);
            ctx.fill();
            // 背包拉链
            ctx.strokeStyle = '#c0392b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + size * 0.37, y - size * 0.75);
            ctx.lineTo(x + size * 0.37, y - size * 0.25);
            ctx.stroke();
            // 背包装饰条
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(x + size * 0.2, y - size * 0.55, size * 0.35, size * 0.05);

            // === 腿部 - 渐变效果 ===
            // 裤子渐变
            const pantsGrad = ctx.createLinearGradient(x - 12, y - size * 0.2, x + 12, y + size * 0.15);
            pantsGrad.addColorStop(0, '#2a2a4e');
            pantsGrad.addColorStop(0.5, pantsColor);
            pantsGrad.addColorStop(1, '#0a0a1e');
            ctx.strokeStyle = pantsGrad;
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            // 左腿
            ctx.beginPath();
            ctx.moveTo(x - 8, y - size * 0.15);
            ctx.lineTo(x - 8 + runCycle * 0.6, y + size * 0.1);
            ctx.stroke();
            // 右腿
            ctx.beginPath();
            ctx.moveTo(x + 8, y - size * 0.15);
            ctx.lineTo(x + 8 - runCycle * 0.6, y + size * 0.1);
            ctx.stroke();

            // 鞋子 - 精美渐变
            const shoeGrad = ctx.createLinearGradient(0, y + size * 0.05, 0, y + size * 0.18);
            shoeGrad.addColorStop(0, '#ff6b6b');
            shoeGrad.addColorStop(0.5, '#e74c3c');
            shoeGrad.addColorStop(1, '#c0392b');
            // 左鞋
            ctx.fillStyle = shoeGrad;
            ctx.beginPath();
            ctx.ellipse(x - 8 + runCycle * 0.6, y + size * 0.12, 10, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            // 鞋底
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(x - 8 + runCycle * 0.6 - 10, y + size * 0.14, 20, 4);
            // 鞋底纹理
            ctx.fillStyle = '#5d6d7e';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(x - 8 + runCycle * 0.6 - 8 + i * 5, y + size * 0.14, 2, 3);
            }
            // 右鞋
            ctx.fillStyle = shoeGrad;
            ctx.beginPath();
            ctx.ellipse(x + 8 - runCycle * 0.6, y + size * 0.12, 10, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(x + 8 - runCycle * 0.6 - 10, y + size * 0.14, 20, 4);
            ctx.fillStyle = '#5d6d7e';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(x + 8 - runCycle * 0.6 - 8 + i * 5, y + size * 0.14, 2, 3);
            }

            // === 身体（外套）- 精美渐变 ===
            const bodyGrad = ctx.createLinearGradient(x - size * 0.4, y - size * 0.9, x + size * 0.4, y - size * 0.1);
            bodyGrad.addColorStop(0, jacketHighlight);
            bodyGrad.addColorStop(0.3, jacketColor);
            bodyGrad.addColorStop(0.7, jacketColor);
            bodyGrad.addColorStop(1, '#0090b8');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.roundRect(x - size * 0.38, y - size * 0.9, size * 0.76, size * 0.8, 10);
            ctx.fill();
            // 外套高光
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.roundRect(x - size * 0.35, y - size * 0.88, size * 0.25, size * 0.6, 5);
            ctx.fill();
            // 外套拉链线
            ctx.strokeStyle = '#0080a0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - size * 0.88);
            ctx.lineTo(x, y - size * 0.15);
            ctx.stroke();
            // 拉链头
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(x, y - size * 0.2, 3, 0, Math.PI * 2);
            ctx.fill();

            // 外套口袋 - 精美设计
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.roundRect(x - size * 0.32, y - size * 0.58, size * 0.24, size * 0.3, 4);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(x + size * 0.08, y - size * 0.58, size * 0.24, size * 0.3, 4);
            ctx.fill();
            // 口袋缝线
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - size * 0.32, y - size * 0.45);
            ctx.lineTo(x - size * 0.08, y - size * 0.45);
            ctx.moveTo(x + size * 0.08, y - size * 0.45);
            ctx.lineTo(x + size * 0.32, y - size * 0.45);
            ctx.stroke();

            // === 手臂 ===
            // 袖子渐变
            const armGrad = ctx.createLinearGradient(x - size * 0.5, y - size * 0.7, x - size * 0.3, y - size * 0.3);
            armGrad.addColorStop(0, jacketHighlight);
            armGrad.addColorStop(1, jacketColor);
            ctx.strokeStyle = armGrad;
            ctx.lineWidth = 9;
            ctx.lineCap = 'round';
            // 左臂（向后摆）
            ctx.beginPath();
            ctx.moveTo(x - size * 0.35, y - size * 0.72);
            ctx.lineTo(x - size * 0.52 - runCycle * 0.3, y - size * 0.35);
            ctx.stroke();
            // 左拳头
            const fistGrad = ctx.createRadialGradient(x - size * 0.52 - runCycle * 0.3 - 2, y - size * 0.35 - 2, 0, x - size * 0.52 - runCycle * 0.3, y - size * 0.32, 6);
            fistGrad.addColorStop(0, '#ffcc99');
            fistGrad.addColorStop(1, skinColor);
            ctx.fillStyle = fistGrad;
            ctx.beginPath();
            ctx.arc(x - size * 0.52 - runCycle * 0.3, y - size * 0.32, 6, 0, Math.PI * 2);
            ctx.fill();
            // 右臂（向前摆）
            ctx.strokeStyle = armGrad;
            ctx.beginPath();
            ctx.moveTo(x + size * 0.35, y - size * 0.72);
            ctx.lineTo(x + size * 0.52 + runCycle * 0.3, y - size * 0.35);
            ctx.stroke();
            // 右拳头
            const fistGrad2 = ctx.createRadialGradient(x + size * 0.52 + runCycle * 0.3 - 2, y - size * 0.35 - 2, 0, x + size * 0.52 + runCycle * 0.3, y - size * 0.32, 6);
            fistGrad2.addColorStop(0, '#ffcc99');
            fistGrad2.addColorStop(1, skinColor);
            ctx.fillStyle = fistGrad2;
            ctx.beginPath();
            ctx.arc(x + size * 0.52 + runCycle * 0.3, y - size * 0.32, 6, 0, Math.PI * 2);
            ctx.fill();

            // === 头部 ===
            // 帽兜/帽子效果 - 精美渐变
            const hoodGrad = ctx.createLinearGradient(x - size * 0.35, y - size * 1.5, x + size * 0.35, y - size * 0.85);
            hoodGrad.addColorStop(0, jacketHighlight);
            hoodGrad.addColorStop(0.5, jacketColor);
            hoodGrad.addColorStop(1, '#0080a0');
            ctx.fillStyle = hoodGrad;
            ctx.beginPath();
            ctx.arc(x, y - size * 1.18, size * 0.36, Math.PI, 0);
            ctx.fill();
            // 帽兜边缘
            ctx.strokeStyle = '#007090';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y - size * 1.18, size * 0.36, Math.PI, 0);
            ctx.stroke();

            // 脸部 - 精美渐变
            const faceGrad = ctx.createRadialGradient(x - 3, y - size * 1.22, 0, x, y - size * 1.15, size * 0.32);
            faceGrad.addColorStop(0, '#ffcc99');
            faceGrad.addColorStop(0.7, skinColor);
            faceGrad.addColorStop(1, '#e8a070');
            ctx.fillStyle = faceGrad;
            ctx.beginPath();
            ctx.arc(x, y - size * 1.15, size * 0.3, 0, Math.PI * 2);
            ctx.fill();

            if (!game.isHurt) {
                // 眼睛（活力表情）- 精美设计
                // 眼眶
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(x - 7, y - size * 1.2, 6, 7, 0, 0, Math.PI * 2);
                ctx.ellipse(x + 7, y - size * 1.2, 6, 7, 0, 0, Math.PI * 2);
                ctx.fill();
                // 眼眶边框
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
                // 眼珠
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.ellipse(x - 6, y - size * 1.19, 3.5, 4, 0, 0, Math.PI * 2);
                ctx.ellipse(x + 8, y - size * 1.19, 3.5, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                // 眼珠高光 - 双层高光更闪亮
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x - 5, y - size * 1.22, 1.8, 0, Math.PI * 2);
                ctx.arc(x + 9, y - size * 1.22, 1.8, 0, Math.PI * 2);
                ctx.fill();
                // 小高光点
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath();
                ctx.arc(x - 7, y - size * 1.17, 0.8, 0, Math.PI * 2);
                ctx.arc(x + 7, y - size * 1.17, 0.8, 0, Math.PI * 2);
                ctx.fill();
                // 眉毛（活力）
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x - 12, y - size * 1.32);
                ctx.quadraticCurveTo(x - 7, y - size * 1.35, x - 3, y - size * 1.32);
                ctx.moveTo(x + 3, y - size * 1.32);
                ctx.quadraticCurveTo(x + 7, y - size * 1.35, x + 12, y - size * 1.32);
                ctx.stroke();
                // 嘴巴（微笑）- 更甜美
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(x, y - size * 1.08, 5, 0.3, Math.PI - 0.3);
                ctx.stroke();
                // 腮红
                ctx.fillStyle = 'rgba(255,150,150,0.3)';
                ctx.beginPath();
                ctx.ellipse(x - 10, y - size * 1.1, 4, 2.5, 0, 0, Math.PI * 2);
                ctx.ellipse(x + 10, y - size * 1.1, 4, 2.5, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 受伤表情：痛苦眯眼
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x - 12, y - size * 1.22);
                ctx.lineTo(x - 4, y - size * 1.18);
                ctx.moveTo(x + 4, y - size * 1.18);
                ctx.lineTo(x + 12, y - size * 1.22);
                ctx.stroke();
                // 痛苦嘴巴
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.ellipse(x, y - size * 1.08, 6, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
            ctx.globalAlpha = 1;

            // 无敌光环 - 精美发光效果
            if (game.isInvincible) {
                // 外层光环
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(x, y - size * 0.4, size * 1.3, 0, Math.PI * 2);
                ctx.stroke();
                // 内层光环
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 5]);
                ctx.beginPath();
                ctx.arc(x, y - size * 0.4, size * 1.1, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                // 粒子效果
                for (let i = 0; i < 6; i++) {
                    const angle = (game.frameCount * 0.05 + i * Math.PI / 3) % (Math.PI * 2);
                    const px = x + Math.cos(angle) * size * 1.4;
                    const py = y - size * 0.4 + Math.sin(angle) * size * 0.8;
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 受伤红圈 - 脉动效果
            if (game.isHurt) {
                const hurtPulse = Math.sin(game.frameCount * 0.3) * 0.3 + 0.7;
                ctx.strokeStyle = `rgba(255, 68, 68, ${hurtPulse})`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(x, y - size * 0.4, size * 1.1, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

                function drawObstacles() {
            game.obstacles.forEach(obs => {
                if (obs.z < 0 || obs.z > CONFIG.trackLength) return;

                const proj = project(obs.z, 0, obs.lane);
                const baseSize = 100 * proj.scale;
                const type = obs.type || OBSTACLE_TYPES[0];

                ctx.lineWidth = 3 * proj.scale;
                ctx.lineCap = 'round';
