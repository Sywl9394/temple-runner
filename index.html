                        var wpGrad = ctx.createRadialGradient(proj.x, proj.y - 5, 0, proj.x, proj.y - 5, baseSize * 0.7);
                        wpGrad.addColorStop(0, 'rgba(100, 180, 255, 0.6)');
                        wpGrad.addColorStop(0.5, 'rgba(50, 130, 200, 0.4)');
                        wpGrad.addColorStop(1, 'rgba(20, 80, 150, 0.2)');
                        ctx.fillStyle = wpGrad;
                        ctx.beginPath();
                        ctx.ellipse(proj.x, proj.y - 5, baseSize * 0.7, baseSize * 0.25, 0, 0, Math.PI * 2);
                        ctx.fill();
                        // 反射高光
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.beginPath();
                        ctx.ellipse(proj.x - baseSize * 0.2, proj.y - baseSize * 0.1, baseSize * 0.25, baseSize * 0.08, -0.3, 0, Math.PI * 2);
                        ctx.fill();
                        // 波纹效果
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.lineWidth = 1 * proj.scale;
                        var ripple = Math.sin(game.frameCount * 0.1) * 0.1 + 1;
                        ctx.beginPath();
                        ctx.ellipse(proj.x, proj.y - 5, baseSize * 0.5 * ripple, baseSize * 0.18 * ripple, 0, 0, Math.PI * 2);
                        ctx.stroke();
                        break;

                    case 'warning_sign':
                        // 警示牌 - 闪烁灯光
                        // 支架
                        ctx.fillStyle = '#5d6d7e';
                        ctx.fillRect(proj.x - baseSize * 0.08, proj.y - baseSize * 1.6, baseSize * 0.16, baseSize * 1.6);
                        // 牌体
                        var wsGrad = ctx.createLinearGradient(0, proj.y - baseSize * 1.6, 0, proj.y - baseSize * 0.5);
                        wsGrad.addColorStop(0, '#e74c3c');
                        wsGrad.addColorStop(1, '#c0392b');
                        ctx.fillStyle = wsGrad;
                        ctx.beginPath();
                        ctx.moveTo(proj.x, proj.y - baseSize * 1.6);
                        ctx.lineTo(proj.x - baseSize * 0.45, proj.y - baseSize * 0.5);
                        ctx.lineTo(proj.x + baseSize * 0.45, proj.y - baseSize * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        ctx.strokeStyle = '#922b21';
                        ctx.lineWidth = 2 * proj.scale;
                        ctx.stroke();
                        // 感叹号
                        ctx.fillStyle = '#FFFFFF';
                        ctx.font = `bold ${baseSize * 0.6}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.fillText('!', proj.x, proj.y - baseSize * 0.85);
                        // 闪烁灯
                        var blinkOn = Math.floor(game.frameCount / 15) % 2 === 0;
                        if (blinkOn) {
                            ctx.fillStyle = '#FFFF00';
                            ctx.shadowColor = '#FFFF00';
                            ctx.shadowBlur = 15 * proj.scale;
                            ctx.beginPath();
                            ctx.arc(proj.x, proj.y - baseSize * 1.3, baseSize * 0.12, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                        break;

                    case 'fire_barrel':
                        // 燃烧桶 - 火焰效果
                        var fbGrad = ctx.createLinearGradient(proj.x - baseSize * 0.35, proj.y, proj.x + baseSize * 0.35, proj.y);
                        fbGrad.addColorStop(0, '#4a4a4a');
                        fbGrad.addColorStop(0.3, '#6a6a6a');
                        fbGrad.addColorStop(0.5, '#8a8a8a');
                        fbGrad.addColorStop(0.7, '#6a6a6a');
                        fbGrad.addColorStop(1, '#4a4a4a');
                        ctx.fillStyle = fbGrad;
                        ctx.beginPath();
                        ctx.ellipse(proj.x, proj.y, baseSize * 0.35, baseSize * 0.15, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillRect(proj.x - baseSize * 0.35, proj.y - baseSize * 1.2, baseSize * 0.7, baseSize * 1.2);
                        ctx.beginPath();
                        ctx.ellipse(proj.x, proj.y - baseSize * 1.2, baseSize * 0.35, baseSize * 0.12, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#2c3e50';
                        ctx.lineWidth = 2 * proj.scale;
                        ctx.strokeRect(proj.x - baseSize * 0.35, proj.y - baseSize * 1.2, baseSize * 0.7, baseSize * 1.2);
                        // 火焰
                        var flicker = Math.sin(game.frameCount * 0.3) * 5;
                        var flameGrad = ctx.createRadialGradient(proj.x, proj.y - baseSize * 1.5, 0, proj.x, proj.y - baseSize * 1.5, baseSize * 0.5);
                        flameGrad.addColorStop(0, 'rgba(255, 255, 100, 0.9)');
                        flameGrad.addColorStop(0.4, 'rgba(255, 150, 0, 0.7)');
                        flameGrad.addColorStop(0.7, 'rgba(255, 50, 0, 0.4)');
                        flameGrad.addColorStop(1, 'rgba(100, 0, 0, 0)');
                        ctx.fillStyle = flameGrad;
                        ctx.beginPath();
                        ctx.moveTo(proj.x, proj.y - baseSize * 1.2 - flicker);
                        ctx.bezierCurveTo(proj.x - baseSize * 0.3, proj.y - baseSize * 1.6, proj.x - baseSize * 0.4, proj.y - baseSize * 1.8, proj.x, proj.y - baseSize * 2.0 - flicker);
                        ctx.bezierCurveTo(proj.x + baseSize * 0.4, proj.y - baseSize * 1.8, proj.x + baseSize * 0.3, proj.y - baseSize * 1.6, proj.x, proj.y - baseSize * 1.2 - flicker);
                        ctx.fill();
                        ctx.shadowColor = '#FF6600';
                        ctx.shadowBlur = 20 * proj.scale;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;

                    case 'laser_gate':
                        // 激光门 - 危险光线
                        // 两侧支柱
                        ctx.fillStyle = '#2c3e50';
                        ctx.fillRect(proj.x - baseSize * 0.85, proj.y - baseSize * 2, baseSize * 0.2, baseSize * 2);
                        ctx.fillRect(proj.x + baseSize * 0.65, proj.y - baseSize * 2, baseSize * 0.2, baseSize * 2);
                        // 支柱灯
                        ctx.fillStyle = '#e74c3c';
                        ctx.shadowColor = '#e74c3c';
                        ctx.shadowBlur = 10 * proj.scale;
                        ctx.beginPath();
                        ctx.arc(proj.x - baseSize * 0.75, proj.y - baseSize * 1.8, baseSize * 0.1, 0, Math.PI * 2);
                        ctx.arc(proj.x + baseSize * 0.75, proj.y - baseSize * 1.8, baseSize * 0.1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // 激光线
                        var laserPulse = Math.sin(game.frameCount * 0.2) * 0.2 + 0.8;
                        ctx.strokeStyle = `rgba(255, 0, 0, ${laserPulse})`;
                        ctx.shadowColor = '#FF0000';
                        ctx.shadowBlur = 15 * proj.scale;
                        ctx.lineWidth = 4 * proj.scale;
                        ctx.beginPath();
                        ctx.moveTo(proj.x - baseSize * 0.75, proj.y - baseSize * 1.5);
                        ctx.lineTo(proj.x + baseSize * 0.75, proj.y - baseSize * 1.5);
                        ctx.stroke();
                        // 第二条激光
                        ctx.strokeStyle = `rgba(255, 100, 100, ${laserPulse * 0.6})`;
                        ctx.lineWidth = 2 * proj.scale;
                        ctx.beginPath();
                        ctx.moveTo(proj.x - baseSize * 0.75, proj.y - baseSize * 1.2);
                        ctx.lineTo(proj.x + baseSize * 0.75, proj.y - baseSize * 1.2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                        break;

                    case 'crystal':
                        // 水晶簇 - 紫色发光水晶
                        var crystalColors = ['#9b59b6', '#8e44ad', '#7d3c98', '#6c3483'];
                        // 主水晶
                        var cgGrad = ctx.createLinearGradient(proj.x - baseSize * 0.3, proj.y, proj.x + baseSize * 0.3, proj.y - baseSize * 1.5);
                        cgGrad.addColorStop(0, '#4a235a');
                        cgGrad.addColorStop(0.3, '#7d3c98');
                        cgGrad.addColorStop(0.5, '#9b59b6');
                        cgGrad.addColorStop(0.7, '#a569bd');
                        cgGrad.addColorStop(1, '#d7bde2');
                        ctx.fillStyle = cgGrad;
                        ctx.beginPath();
                        ctx.moveTo(proj.x, proj.y - baseSize * 1.5);
                        ctx.lineTo(proj.x + baseSize * 0.25, proj.y - baseSize * 0.5);
                        ctx.lineTo(proj.x + baseSize * 0.3, proj.y);
                        ctx.lineTo(proj.x - baseSize * 0.3, proj.y);
                        ctx.lineTo(proj.x - baseSize * 0.25, proj.y - baseSize * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        // 发光效果
                        ctx.shadowColor = '#9b59b6';
                        ctx.shadowBlur = 15 * proj.scale;
                        ctx.strokeStyle = '#d7bde2';
                        ctx.lineWidth = 2 * proj.scale;
                        ctx.stroke();
                        // 小水晶
                        ctx.fillStyle = '#8e44ad';
                        ctx.beginPath();
                        ctx.moveTo(proj.x - baseSize * 0.25, proj.y - baseSize * 0.8);
                        ctx.lineTo(proj.x - baseSize * 0.1, proj.y - baseSize * 0.4);
                        ctx.lineTo(proj.x - baseSize * 0.3, proj.y);
                        ctx.lineTo(proj.x - baseSize * 0.4, proj.y);
                        ctx.lineTo(proj.x - baseSize * 0.35, proj.y - baseSize * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        // 高光
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        ctx.beginPath();
                        ctx.moveTo(proj.x - baseSize * 0.1, proj.y - baseSize * 1.2);
                        ctx.lineTo(proj.x + baseSize * 0.05, proj.y - baseSize * 0.6);
                        ctx.lineTo(proj.x - baseSize * 0.15, proj.y - baseSize * 0.8);
                        ctx.closePath();
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                }

                // 实体阴影 - 精美渐变
                var shadowGrad = ctx.createRadialGradient(proj.x, proj.y + 3 * proj.scale, 0, proj.x, proj.y + 3 * proj.scale, baseSize * 0.8);
                shadowGrad.addColorStop(0, 'rgba(0,0,0,0.6)');
                shadowGrad.addColorStop(0.5, 'rgba(0,0,0,0.3)');
                shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = shadowGrad;
                ctx.beginPath();
                ctx.ellipse(proj.x, proj.y + 3 * proj.scale, baseSize * 0.8, baseSize * 0.22, 0, 0, Math.PI * 2);
                ctx.fill();

                // 可跳跃障碍物：显示红色向上箭头提示 - 精美效果
                if (type.canJumpOver) {
                    var arrowX = proj.x;
                    var arrowBaseY = proj.y - baseSize * type.height - baseSize * 0.3;
                    var arrowLen = baseSize * 0.55;
                    var arrowHeadW = baseSize * 0.28;
                    var arrowHeadH = baseSize * 0.28;
                    var shaftW = baseSize * 0.10;
                    var bounce = Math.sin(game.frameCount * 0.15 + obs.z * 0.01) * 4 * proj.scale;
                    var tipY = arrowBaseY - arrowLen + bounce;
                    var arrowBase = arrowBaseY + bounce;

                    ctx.save();
                    // 箭头发光
                    ctx.shadowColor = '#ff2222';
                    ctx.shadowBlur = 10 * proj.scale;
                    ctx.fillStyle = '#ff2222';
                    ctx.strokeStyle = '#880000';
                    ctx.lineWidth = 1.5 * proj.scale;
                    ctx.beginPath();
                    ctx.moveTo(arrowX, tipY);
                    ctx.lineTo(arrowX - arrowHeadW / 2, tipY + arrowHeadH);
                    ctx.lineTo(arrowX - shaftW / 2, tipY + arrowHeadH);
                    ctx.lineTo(arrowX - shaftW / 2, arrowBase);
                    ctx.lineTo(arrowX + shaftW / 2, arrowBase);
                    ctx.lineTo(arrowX + shaftW / 2, tipY + arrowHeadH);
                    ctx.lineTo(arrowX + arrowHeadW / 2, tipY + arrowHeadH);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            });
        }


        function drawCoins() {
            game.coins.forEach(coin => {
                if (coin.z < 0 || coin.z > CONFIG.trackLength) return;

                const proj = project(coin.z, 0, coin.lane);
                const size = 18 * proj.scale;
                const bobOffset = Math.sin(game.frameCount * 0.2 + coin.id * 3) * 6 * proj.scale;
                const cx = proj.x;
                const cy = proj.y - 22 * proj.scale + bobOffset;

                // 旋转效果（通过椭圆模拟）
                const spinAngle = game.frameCount * 0.12 + coin.id * 2;
                const squeezeX = Math.abs(Math.cos(spinAngle)); // 0~1 压缩比例
                const coinW = size * (0.3 + squeezeX * 0.7);   // 旋转时宽度变化
                const coinH = size;                             // 高度不变

                // 星光拖尾效果
                const trailAngle = game.frameCount * 0.08 + coin.id * 5;
                for (let i = 3; i >= 1; i--) {
                    const trailX = cx - i * 4 * proj.scale * Math.cos(trailAngle);
                    const trailY = cy - i * 3 * proj.scale * Math.sin(trailAngle);
                    const trailAlpha = 0.15 * (4 - i) / 3;
                    ctx.fillStyle = `rgba(255, 215, 0, ${trailAlpha})`;
                    ctx.beginPath();
                    ctx.ellipse(trailX, trailY, coinW * 0.3, coinH * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 外发光光晕
                const glowGrad = ctx.createRadialGradient(cx, cy, coinW * 0.5, cx, cy, coinW * 2);
                glowGrad.addColorStop(0, 'rgba(255, 215, 0, 0.4)');
                glowGrad.addColorStop(0.5, 'rgba(255, 180, 0, 0.2)');
                glowGrad.addColorStop(1, 'rgba(255, 150, 0, 0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.ellipse(cx, cy, coinW * 2, coinH * 2, 0, 0, Math.PI * 2);
                ctx.fill();

                // 外发光
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15 * proj.scale;

                // 金币主体渐变 - 更精美
                const grad = ctx.createLinearGradient(cx - coinW, cy - coinH, cx + coinW, cy + coinH);
                grad.addColorStop(0, '#FFF8DC');
                grad.addColorStop(0.2, '#FFD700');
                grad.addColorStop(0.4, '#FFEC8B');
                grad.addColorStop(0.6, '#FFD700');
                grad.addColorStop(0.8, '#DAA520');
                grad.addColorStop(1, '#B8860B');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(cx, cy, coinW, coinH, 0, 0, Math.PI * 2);
                ctx.fill();

                // 金币边缘 - 双层
                ctx.strokeStyle = '#8B6914';
                ctx.lineWidth = 2 * proj.scale;
                ctx.stroke();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1 * proj.scale;
                ctx.beginPath();
                ctx.ellipse(cx, cy - coinH * 0.1, coinW * 0.95, coinH * 0.95, 0, Math.PI * 1.2, Math.PI * 1.8);
                ctx.stroke();

                // 币面 $ 符号（仅当硬币正面朝前时显示）
                if (squeezeX > 0.5) {
                    // 符号阴影
                    ctx.fillStyle = '#8B6914';
                    ctx.font = `bold ${size * 1.1}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', cx + 1, cy + 1);
                    // 符号本体
                    ctx.fillStyle = '#FFE066';
                    ctx.fillText('$', cx, cy);
                }

                // 高光条纹 - 更闪亮
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 2 * proj.scale;
                ctx.beginPath();
                ctx.arc(cx, cy, coinW * 0.55, -Math.PI * 0.5, Math.PI * 0.5);
                ctx.stroke();

                // 顶部高光点
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.arc(cx - coinW * 0.3, cy - coinH * 0.5, coinW * 0.2, 0, Math.PI * 2);
                ctx.fill();

                // 边缘亮环
                ctx.strokeStyle = 'rgba(255,215,0,0.5)';
                ctx.lineWidth = 1.5 * proj.scale;
                ctx.beginPath();
                ctx.ellipse(cx, cy, coinW * 1.15, coinH * 1.15, 0, 0, Math.PI * 2);
                ctx.stroke();

                // 旋转星光粒子
                for (let i = 0; i < 2; i++) {
                    const starAngle = game.frameCount * 0.15 + i * Math.PI + coin.id * 3;
                    const starX = cx + Math.cos(starAngle) * coinW * 1.3;
                    const starY = cy + Math.sin(starAngle) * coinH * 1.3;
                    ctx.fillStyle = 'rgba(255, 255, 200, 0.8)';
                    ctx.beginPath();
                    ctx.arc(starX, starY, 2 * proj.scale, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.shadowBlur = 0;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            });
        }

        function drawPowerups() {
            game.powerups.forEach(pu => {
                if (pu.z < 0 || pu.z > CONFIG.trackLength) return;
                
                const proj = project(pu.z, 0, pu.lane);
                const size = 18 * proj.scale; // 与金币同样大小
                const pulseSize = size + Math.sin(game.frameCount * 0.3) * 4 * proj.scale;
                const bobOffset = Math.sin(game.frameCount * 0.2 + pu.id * 3) * 6 * proj.scale;
                const cx = proj.x;
                const cy = proj.y - 22 * proj.scale + bobOffset;
                
                const isInvincible = pu.type === 'invincible';
                const mainColor = isInvincible ? '#00FF00' : '#FF6699';
                const glowColor = isInvincible ? '#00FF00' : '#FF6699';
                const lightColor = isInvincible ? '#90FF90' : '#FFB6D9';
                const darkColor = isInvincible ? '#008800' : '#CC3366';
                const starColor = isInvincible ? 'rgba(200, 255, 200, 0.8)' : 'rgba(255, 200, 220, 0.8)';
                
                // 发光效果
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 30 * proj.scale;
                
                // 外圈光环
                ctx.strokeStyle = isInvincible ? 'rgba(0, 255, 0, 0.4)' : 'rgba(255, 102, 153, 0.4)';
                ctx.lineWidth = 2 * proj.scale;
                ctx.beginPath();
                ctx.arc(cx, cy - size * 0.8, pulseSize * 1.5, 0, Math.PI * 2);
                ctx.stroke();
                
                // 能量球外圈
                ctx.strokeStyle = mainColor;
                ctx.lineWidth = 3 * proj.scale;
                ctx.beginPath();
                ctx.arc(cx, cy, pulseSize * 1.1, 0, Math.PI * 2);
                ctx.stroke();
                
                // 能量球主体（与金币同样大小）
                const gradient = ctx.createRadialGradient(
                    cx - size * 0.3, cy - size * 0.3, 0,
                    cx, cy, size
                );
                gradient.addColorStop(0, lightColor);
                gradient.addColorStop(0.5, mainColor);
                gradient.addColorStop(1, darkColor);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(cx, cy, size, 0, Math.PI * 2);
                ctx.fill();
                
                // 内部高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(cx - size * 0.3, cy - size * 0.3, size * 0.25, 0, Math.PI * 2);
                ctx.fill();
                
                // 顶部高光点
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.arc(cx, cy - size * 0.5, size * 0.15, 0, Math.PI * 2);
                ctx.fill();
                
                // 中心图标
                if (isInvincible) {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `bold ${14 * proj.scale}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⚡', cx, cy);
                } else {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `bold ${12 * proj.scale}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🧲', cx, cy);
                }
                
                // 旋转星光粒子
                for (let i = 0; i < 2; i++) {
                    const starAngle = game.frameCount * 0.15 + i * Math.PI + pu.id * 3;
                    const starX = cx + Math.cos(starAngle) * size * 1.4;
                    const starY = cy + Math.sin(starAngle) * size * 1.4;
                    ctx.fillStyle = starColor;
                    ctx.beginPath();
                    ctx.arc(starX, starY, 2 * proj.scale, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            });
        }

        function drawParticles() {
            game.particles = game.particles.filter(p => {
                p.life -= 0.02;
                if (p.life <= 0) return false;
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                
                return true;
            });
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                game.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    size: Math.random() * 8 + 4,
                    life: 1,
                    color: color
                });
            }
        }

        // ==================== 游戏逻辑 ====================
        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
            
            // 随机决定是否生成多障碍物组合
            const spawnMultiple = Math.random() > 0.75 && game.speed > 8;
            const lanes = [lane];
            
            if (spawnMultiple) {
                const secondLane = (lane + (Math.random() > 0.5 ? 1 : 2)) % 3;
                lanes.push(secondLane);
            }
            
            lanes.forEach(l => {
                game.obstacles.push({
                    z: CONFIG.trackLength,
                    lane: l,
                    type: type,
                    rotation: Math.random() * Math.PI * 2
                });
            });
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * 3);
            // 有时生成一排金币
            const count = Math.random() > 0.7 ? 3 : 1;
            
            for (let i = 0; i < count; i++) {
                game.coins.push({
                    z: CONFIG.trackLength + i * 80,
                    lane: lane,
                    id: Math.random()
                });
            }
        }

        function spawnPowerup() {
            const lane = Math.floor(Math.random() * 3);
            // 随机生成无敌球或磁铁道具，从更远处生成
            const type = Math.random() > 0.5 ? 'invincible' : 'magnet';
            game.powerups.push({
                z: CONFIG.trackLength + Math.random() * 500,
                lane: lane,
                type: type
            });
        }

        function checkCollisions() {
            const playerX = width / 2 + (game.playerLane - 1) * CONFIG.laneWidth;
            const playerY = height * CONFIG.playerY;
            const playerLaneRounded = Math.round(game.playerLane);
            
            // 检查障碍物碰撞
            if (!game.isInvincible && !game.isDying) {
                for (let obs of game.obstacles) {
                    // 使用 Math.abs 检查玩家是否在该车道（允许0.5的误差范围）
                    const laneMatch = Math.abs(game.playerLane - obs.lane) < 0.6;
                    if (obs.z < 150 && obs.z > 30 && laneMatch) {
                        takeDamage(obs.type ? obs.type.damage : 1);
                        obs.z = -200; // 移除碰撞的障碍物
                        break;
                    }
                }
            }
            
            // 检查金币收集
            game.coins = game.coins.filter(coin => {
                // 吸金币效果：磁铁激活时，金币会飞向玩家
                if (game.isMagnetActive && coin.z < 400 && coin.z > 0) {
                    // 金币向玩家移动
                    coin.magnetized = true;
                    const magnetSpeed = 15;
                    coin.z -= magnetSpeed;
                    // 车道向玩家车道靠近
                    if (coin.lane < game.playerLane) coin.lane += 0.08;
                    if (coin.lane > game.playerLane) coin.lane -= 0.08;
                }
                
                if (coin.z < 80 && coin.z > 20 && Math.abs(game.playerLane - coin.lane) < 0.6) {
                    game.score += 10;
                    updateScore();
                    const proj = project(coin.z, 0, coin.lane);
                    spawnParticles(proj.x, proj.y - 30, '255, 215, 0', 8);

                    // 每获得2000积分，速度提升一档
                    const newLevel = Math.floor(game.score / 2000);
                    if (newLevel > game.speedLevel && game.speed < CONFIG.maxSpeed) {
                        game.speedLevel = newLevel;
                        game.speed = Math.min(CONFIG.initialSpeed + game.speedLevel * 0.8, CONFIG.maxSpeed);
                        game.speedBoostFlash = 60; // 触发闪烁提示
                        spawnSpeedBoostParticles(proj.x, proj.y - 50);
                    }
                    return false;
                }
                return coin.z > 0;
            });
            
            // 道具收集（无敌球或磁铁球）
            game.powerups = game.powerups.filter(pu => {
                if (pu.z < 80 && pu.z > 20 && Math.abs(game.playerLane - pu.lane) < 0.6) {
                    game.score += 50;
                    updateScore();
                    const proj = project(pu.z, 0, pu.lane);
                    
                    if (pu.type === 'invincible') {
                        // 无敌球：激活无敌
                        game.isInvincible = true;
                        game.powerupEndTime = Date.now() + CONFIG.powerupDuration;
                        document.getElementById('powerupIndicator').classList.remove('hidden');
                        document.getElementById('powerupIndicator').textContent = '⚡ 无敌时间 ⚡';
                        spawnParticles(proj.x, proj.y - 30, '255, 215, 0', 15);
                    } else if (pu.type === 'magnet') {
                        // 磁铁球：激活吸金币
                        game.isMagnetActive = true;
                        game.magnetEndTime = Date.now() + CONFIG.magnetDuration;
                        document.getElementById('magnetIndicator').classList.remove('hidden');
                        spawnParticles(proj.x, proj.y - 30, '255, 100, 100', 15);
                    }
                    return false;
                }
                return pu.z > 0;
            });
        }

        function takeDamage(damage) {
            game.lives -= damage;
            
            // 触发受伤效果
            game.isHurt = true;
            game.hurtEndTime = Date.now() + CONFIG.invincibilityDuration;
            game.isInvincible = true;
            
            // 屏幕震动
            canvas.classList.add('screen-shake');
            setTimeout(() => canvas.classList.remove('screen-shake'), 300);
            
            // 伤害闪烁
            canvas.classList.add('damage-flash');
            setTimeout(() => canvas.classList.remove('damage-flash'), 500);
            
            // 死亡粒子
            const playerX = width / 2;
            const playerY = height * CONFIG.playerY;
            spawnDeathParticles(playerX, playerY);
            
            // 更新生命显示
            updateLivesDisplay();
            
            // 检查是否死亡
            if (game.lives <= 0) {
                gameOver();
            } else {
                // 受伤后短暂无敌
                setTimeout(() => {
                    if (game.lives > 0) {
                        game.isInvincible = false;
                        game.isHurt = false;
                    }
                }, CONFIG.invincibilityDuration);
            }
        }

        function spawnSpeedBoostParticles(x, y) {
            for (let i = 0; i < 20; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
                const speed = 4 + Math.random() * 6;
                game.deathParticles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 6 + Math.random() * 10,
                    life: 1.2,
                    color: ['#00ffff', '#00ff88', '#88ff00'][Math.floor(Math.random() * 3)]
                });
            }
        }

        function spawnDeathParticles(x, y) {
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const speed = 3 + Math.random() * 5;
                game.deathParticles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 5 + Math.random() * 10,
                    life: 1,
                    color: Math.random() > 0.5 ? '#ff4444' : '#ff8800'
                });
            }
        }

        function drawDeathParticles() {
            game.deathParticles = game.deathParticles.filter(p => {
                p.life -= 0.03;
                if (p.life <= 0) return false;
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.vx *= 0.98;
                
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                return true;
            });
        }

        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < CONFIG.maxLives; i++) {
                if (i < game.lives) {
                    hearts += '❤️';
                } else {
                    hearts += '🖤';
                }
            }
            document.getElementById('livesDisplay').textContent = hearts;
        }

        function update() {
            if (game.state !== 'playing') return;
            
            game.frameCount++;
            
            // 更新速度（不再自动递增，改由金币收集触发）
            // 速度等级衰减：每2000金币升0.5档，上限maxSpeed
            
            // 平滑移动玩家
            const targetX = (game.targetLane - 1) * CONFIG.laneWidth;
            const currentX = (game.playerLane - 1) * CONFIG.laneWidth;
            game.playerLane += (game.targetLane - game.playerLane) * 0.15;
            
            // 更新跳跃状态
            if (game.isJumping) {
                game.jumpFrame++;
                // 跳跃轨迹：先上升后下降
                const progress = game.jumpFrame / CONFIG.jumpDuration;
                if (progress < 0.5) {
                    // 上升阶段
                    game.jumpHeight = CONFIG.jumpHeight * (progress * 2);
                } else {
                    // 下降阶段
                    game.jumpHeight = CONFIG.jumpHeight * ((1 - progress) * 2);
                }
                if (game.jumpFrame >= CONFIG.jumpDuration) {
                    game.isJumping = false;
                    game.jumpFrame = 0;
                    game.jumpHeight = 0;
                }
            }
            
            // 更新无敌状态（能量道具）
            if (game.isInvincible && !game.isHurt && !game.isPermInvincible && Date.now() > game.powerupEndTime) {
                game.isInvincible = false;
                document.getElementById('powerupIndicator').classList.add('hidden');
            }
            // 永久无敌状态也保持无敌效果
            if (game.isPermInvincible) {
                game.isInvincible = true;
                document.getElementById('powerupIndicator').classList.remove('hidden');
                document.getElementById('powerupIndicator').textContent = '🛡️ 永久无敌 🛡️';
            }
            
            // 更新磁铁状态
            if (game.isMagnetActive && Date.now() > game.magnetEndTime) {
                game.isMagnetActive = false;
                document.getElementById('magnetIndicator').classList.add('hidden');
            }
            
            // 更新受伤闪烁
            if (game.isHurt && Date.now() > game.hurtEndTime) {
                game.isHurt = false;
            }
            
            // 移动物体（速度加快）
            const moveSpeed = game.speed * 1.8;
            game.obstacles.forEach(obs => obs.z -= moveSpeed);
            game.coins.forEach(coin => coin.z -= moveSpeed);
            game.powerups.forEach(pu => pu.z -= moveSpeed);
            
            // 清理超出范围的物体
            game.obstacles = game.obstacles.filter(obs => obs.z > -100);
            game.coins = game.coins.filter(coin => coin.z > -100);
            game.powerups = game.powerups.filter(pu => pu.z > -100);
            
            // 生成新物体
            if (game.frameCount - game.lastObstacleSpawn > game.nextObstacleSpawn) {
                spawnObstacle();
                game.lastObstacleSpawn = game.frameCount;
                game.nextObstacleSpawn = CONFIG.obstacleSpawnInterval[0] + 
                    Math.random() * (CONFIG.obstacleSpawnInterval[1] - CONFIG.obstacleSpawnInterval[0]);
            }
            
            if (game.frameCount - game.lastCoinSpawn > game.nextCoinSpawn) {
                spawnCoin();
                game.lastCoinSpawn = game.frameCount;
                game.nextCoinSpawn = CONFIG.coinSpawnInterval[0] + 
                    Math.random() * (CONFIG.coinSpawnInterval[1] - CONFIG.coinSpawnInterval[0]);
            }
            
            // 能量道具已禁用，改为按钮触发永久无敌
            
            // 检查碰撞
            checkCollisions();
            
            // 生成跑步尘土粒子
            if (game.frameCount % 3 === 0) {
                const dustCount = Math.floor(game.speed / 3);
                for (let i = 0; i < dustCount; i++) {
                    game.dustParticles.push({
                        x: width / 2 + (Math.random() - 0.5) * 30,
                        y: height * CONFIG.playerY + 10,
                        vx: -game.speed * 0.5 + (Math.random() - 0.5) * 2,
                        vy: -Math.random() * 2 - 1,
                        size: 3 + Math.random() * 4,
                        life: 1,
                        color: Math.random() > 0.5 ? 'rgba(180, 160, 140, 0.6)' : 'rgba(150, 130, 110, 0.5)'
                    });
                }
            }
            
            // 更新尘土粒子
            game.dustParticles = game.dustParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                p.life -= 0.04;
                p.size *= 0.98;
                return p.life > 0 && p.size > 0.5;
            });
            
            // 增加时间分数
            if (game.frameCount % 60 === 0) {
                game.score += 1;
                updateScore();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // 绘制背景渐变
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#0d0500');
            bgGradient.addColorStop(0.4, '#1a0a00');
            bgGradient.addColorStop(1, '#2d1810');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 绘制天空装饰
            drawSky();
            
            // 绘制跑道
            drawTrack();
            
            // 绘制物体（按距离从远到近排序后绘制）
            const allObjects = [
                ...game.obstacles.map(o => ({...o, drawType: 'obstacle'})),
                ...game.coins.map(c => ({...c, drawType: 'coin'})),
                ...game.powerups.map(p => ({...p, drawType: 'powerup'}))
            ].sort((a, b) => b.z - a.z);
            
            // 只调用一次绘制函数
            drawObstacles();
            drawCoins();
            drawPowerups();
            
            // 绘制玩家
            drawPlayer();
            
            // 绘制尘土粒子效果
            game.dustParticles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // 绘制粒子
            drawParticles();
            
            // 绘制死亡粒子
            drawDeathParticles();
            
            // 绘制速度指示
            drawSpeedIndicator();
            
            // 绘制受伤遮罩
            if (game.isHurt) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fillRect(0, 0, width, height);
            }

            // 速度提升闪烁效果
            if (game.speedBoostFlash > 0) {
                const flashAlpha = game.speedBoostFlash / 60 * 0.35;
                ctx.fillStyle = `rgba(0, 255, 136, ${flashAlpha})`;
                ctx.fillRect(0, 0, width, height);

                // 显示 "SPEED UP!" 文字
                const textAlpha = Math.min(1, game.speedBoostFlash / 20);
                const textY = height * 0.35;
                ctx.save();
                ctx.globalAlpha = textAlpha;
                ctx.fillStyle = '#00ff88';
                ctx.strokeStyle = '#004422';
                ctx.lineWidth = 4;
                ctx.font = `bold ${48}px 'Arial Black', Arial`;
                ctx.textAlign = 'center';
                ctx.strokeText('⚡ SPEED UP! ⚡', width / 2, textY);
                ctx.fillText('⚡ SPEED UP! ⚡', width / 2, textY);
                ctx.restore();

                game.speedBoostFlash--;
            }
        }

        function drawSky() {
            // 城市天空渐变（黄昏/夜间城市）- 精美版
            const horizonY = height * CONFIG.horizonY;
            
            // 多层天空渐变
            const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY + 80);
            skyGrad.addColorStop(0, '#050510');      // 深夜黑蓝
            skyGrad.addColorStop(0.2, '#0a0a20');    // 深空蓝
            skyGrad.addColorStop(0.4, '#151535');    // 深蓝紫
            skyGrad.addColorStop(0.6, '#1a1a40');    // 暗蓝紫
            skyGrad.addColorStop(0.8, '#2d1b4e');    // 暗紫
            skyGrad.addColorStop(0.9, '#4a2040');    // 暗红紫
            skyGrad.addColorStop(1, '#5a3050');      // 地平线

            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, width, horizonY + 80);

            // 星星 - 多层星群
            const starSeed = 12345;
            for (let i = 0; i < 80; i++) {
                const sx = ((i * 7919 + starSeed) % width);
                const sy = ((i * 6271 + starSeed * 2) % (horizonY * 0.9));
                const brightness = 0.3 + Math.sin(game.frameCount * 0.05 + i * 0.5) * 0.3 + 0.4;
                const size = 0.5 + ((i * 13) % 10) * 0.1;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 流星效果
            if (Math.random() < 0.01 && game.state === 'playing') {
                game.meteorParticles.push({
                    x: Math.random() * width,
                    y: Math.random() * horizonY * 0.5,
                    vx: 8 + Math.random() * 4,
                    vy: 3 + Math.random() * 2,
                    life: 1,
                    length: 30 + Math.random() * 20
                });
            }
            
            // 绘制流星
            game.meteorParticles = game.meteorParticles.filter(m => {
                m.x += m.vx;
                m.y += m.vy;
                m.life -= 0.03;
                if (m.life <= 0) return false;
                
                const meteorGrad = ctx.createLinearGradient(m.x, m.y, m.x - m.length, m.y + m.length * 0.4);
                meteorGrad.addColorStop(0, `rgba(255, 255, 255, ${m.life})`);
                meteorGrad.addColorStop(0.3, `rgba(200, 220, 255, ${m.life * 0.6})`);
                meteorGrad.addColorStop(1, 'rgba(100, 150, 255, 0)');
                
                ctx.strokeStyle = meteorGrad;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.length, m.y + m.length * 0.4);
                ctx.stroke();
                
                // 流星头部
                ctx.fillStyle = `rgba(255, 255, 255, ${m.life})`;
                ctx.beginPath();
                ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
                ctx.fill();
                
                return true;
            });

            // 云层效果 - 渐变云朵
            ctx.globalAlpha = 0.15;
            for (let i = 0; i < 5; i++) {
                const cloudX = ((game.frameCount * 0.2 + i * 300) % (width + 200)) - 100;
                const cloudY = horizonY * (0.15 + i * 0.08);
                const cloudW = 120 + i * 30;
                const cloudH = 25 + i * 5;
                
                const cloudGrad = ctx.createRadialGradient(cloudX, cloudY, 0, cloudX, cloudY, cloudW);
                cloudGrad.addColorStop(0, 'rgba(100, 80, 120, 0.8)');
                cloudGrad.addColorStop(0.5, 'rgba(60, 50, 80, 0.5)');
                cloudGrad.addColorStop(1, 'rgba(40, 30, 60, 0)');
                
                ctx.fillStyle = cloudGrad;
                ctx.beginPath();
                ctx.ellipse(cloudX, cloudY, cloudW, cloudH, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // 城市剪影（高楼轮廓）- 精美渐变
            const buildingGrad = ctx.createLinearGradient(0, horizonY - height * 0.4, 0, horizonY);
            buildingGrad.addColorStop(0, '#0a0a12');
            buildingGrad.addColorStop(0.5, '#0f0f1a');
            buildingGrad.addColorStop(1, '#151520');
            ctx.fillStyle = buildingGrad;
            
            const buildings = [
                { x: 0.02, w: 0.06, h: 0.25 },
                { x: 0.07, w: 0.04, h: 0.18 },
                { x: 0.10, w: 0.05, h: 0.30 },
                { x: 0.14, w: 0.03, h: 0.20 },
                { x: 0.16, w: 0.07, h: 0.28 },
                { x: 0.22, w: 0.04, h: 0.22 },
                { x: 0.25, w: 0.06, h: 0.35 },
                { x: 0.30, w: 0.03, h: 0.17 },
                { x: 0.32, w: 0.05, h: 0.25 },
                { x: 0.36, w: 0.04, h: 0.20 },
                { x: 0.39, w: 0.06, h: 0.32 },
                { x: 0.44, w: 0.03, h: 0.18 },
                { x: 0.46, w: 0.05, h: 0.28 },
                { x: 0.50, w: 0.04, h: 0.22 },
                { x: 0.53, w: 0.07, h: 0.38 },
                { x: 0.59, w: 0.03, h: 0.15 },
                { x: 0.61, w: 0.05, h: 0.26 },
                { x: 0.65, w: 0.04, h: 0.20 },
                { x: 0.68, w: 0.06, h: 0.30 },
                { x: 0.73, w: 0.03, h: 0.18 },
                { x: 0.75, w: 0.05, h: 0.25 },
                { x: 0.79, w: 0.04, h: 0.22 },
                { x: 0.82, w: 0.06, h: 0.35 },
                { x: 0.87, w: 0.04, h: 0.20 },
                { x: 0.90, w: 0.06, h: 0.28 },
            ];

            for (const b of buildings) {
                const bx = b.x * width;
                const bw = b.w * width;
                const bh = b.h * horizonY;
                ctx.fillRect(bx, horizonY - bh, bw, bh);
                
                // 建筑顶部装饰灯
                if (b.h > 0.25) {
                    ctx.fillStyle = `rgba(255, 0, 0, ${0.5 + Math.sin(game.frameCount * 0.05 + b.x * 10) * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(bx + bw / 2, horizonY - bh, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 窗户灯光（随机亮灯）- 精美多层效果
            for (const b of buildings) {
                const bx = b.x * width;
                const bw = b.w * width;
                const bh = b.h * horizonY;
                const cols = Math.floor(bw / 8);
                const rows = Math.floor(bh / 10);
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const seed = (r * cols + c + b.x * 1000) % 17;
                        if (seed < 6) {
                            const wx = bx + c * 8 + 2;
                            const wy = horizonY - bh + r * 10 + 3;
                            if (wy < horizonY - 5) {
                                const flicker = Math.sin(game.frameCount * 0.1 + seed * 3) > 0.3 ? 0.9 : 0.3;
                                // 窗户发光效果
                                const windowColors = ['#FFE66D', '#FFA500', '#87CEEB', '#98FB98'];
                                const windowColor = windowColors[seed % windowColors.length];
                                ctx.fillStyle = windowColor;
                                ctx.globalAlpha = flicker * 0.8;
                                ctx.fillRect(wx, wy, 4, 5);
                                // 窗户光晕
                                ctx.globalAlpha = flicker * 0.2;
                                ctx.fillRect(wx - 1, wy - 1, 6, 7);
                            }
                        }
                    }
                }
            }
            ctx.globalAlpha = 1;

            // 远处霓虹灯广告牌 - 精美发光效果
            // 红色广告牌
            ctx.shadowColor = '#E74C3C';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#E74C3C';
            ctx.fillRect(width * 0.15, horizonY - height * 0.12, width * 0.12, height * 0.06);
            // 广告牌边框
            ctx.strokeStyle = '#FF6B6B';
            ctx.lineWidth = 2;
            ctx.strokeRect(width * 0.15, horizonY - height * 0.12, width * 0.12, height * 0.06);
            ctx.shadowBlur = 0;
            
            // 蓝色广告牌
            ctx.shadowColor = '#3498DB';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#3498DB';
            ctx.fillRect(width * 0.6, horizonY - height * 0.09, width * 0.08, height * 0.05);
            ctx.strokeStyle = '#5DADE2';
            ctx.lineWidth = 2;
            ctx.strokeRect(width * 0.6, horizonY - height * 0.09, width * 0.08, height * 0.05);
            ctx.shadowBlur = 0;

            // 地平线光晕
            const horizonGlow = ctx.createLinearGradient(0, horizonY - 30, 0, horizonY + 30);
            horizonGlow.addColorStop(0, 'rgba(100, 50, 80, 0)');
            horizonGlow.addColorStop(0.5, 'rgba(150, 80, 100, 0.3)');
            horizonGlow.addColorStop(1, 'rgba(80, 40, 60, 0)');
            ctx.fillStyle = horizonGlow;
            ctx.fillRect(0, horizonY - 30, width, 60);
        }

        function drawSpeedIndicator() {
            const speedPercent = (game.speed - CONFIG.initialSpeed) / (CONFIG.maxSpeed - CONFIG.initialSpeed);

            // 速度等级标签（每次2000金币触发）
            if (game.speedLevel > 0) {
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`LV.${game.speedLevel}`, 20, height - 46);
            }

            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(20, height - 40, 100, 15);

            const speedGradient = ctx.createLinearGradient(20, 0, 120, 0);
            speedGradient.addColorStop(0, '#00ff00');
            speedGradient.addColorStop(0.5, '#ffff00');
            speedGradient.addColorStop(1, '#ff0000');

            ctx.fillStyle = speedGradient;
            ctx.fillRect(20, height - 40, 100 * speedPercent, 15);

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(20, height - 40, 100, 15);

            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.fillText('速度', 20, height - 45);

            // 下次加速还需获得的积分
            const nextLevelScore = (game.speedLevel + 1) * 2000;
            const scoreToNext = nextLevelScore - game.score;
            if (scoreToNext > 0 && game.speed < CONFIG.maxSpeed) {
                ctx.fillStyle = 'rgba(255,215,0,0.8)';
                ctx.font = '10px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(`再得 ${scoreToNext} 积分加速`, 125, height - 46);
            }
        }

        function gameOver() {
            game.state = 'gameover';
            
            // 壮观的死亡效果
            const playerX = width / 2;
            const playerY = height * CONFIG.playerY;
            
            // 大量爆炸粒子
            for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 8;
                game.deathParticles.push({
                    x: playerX,
                    y: playerY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 3,
                    size: 8 + Math.random() * 15,
                    life: 1.5,
                    color: ['#ff4444', '#ff8800', '#ffff00', '#ff0000'][Math.floor(Math.random() * 4)]
                });
            }
            
            // 屏幕强烈震动
            canvas.classList.add('screen-shake');
            setTimeout(() => canvas.classList.remove('screen-shake'), 500);
            
            // 红色闪烁
            canvas.classList.add('damage-flash');
            setTimeout(() => canvas.classList.remove('damage-flash'), 500);
            
            // 延迟显示结束界面
            setTimeout(() => {
                // 检查新纪录
                const isNewRecord = game.score > game.highScore;
                if (isNewRecord) {
                    game.highScore = game.score;
                    localStorage.setItem('templeRunnerHighScore', game.highScore);
                }
                
                // 显示结束界面
                document.getElementById('finalScore').textContent = game.score;
                document.getElementById('newRecord').classList.toggle('hidden', !isNewRecord);
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }, 800);
        }

        function updateScore() {
            document.getElementById('scoreDisplay').textContent = game.score;
            document.getElementById('highScoreDisplay').textContent = game.highScore;
        }

        function startGame() {
            game.state = 'playing';
            game.score = 0;
            game.speed = CONFIG.initialSpeed;
            game.playerLane = 1;
            game.targetLane = 1;
            game.obstacles = [];
            game.coins = [];
            game.powerups = [];
            game.particles = [];
            game.deathParticles = [];
            game.lastObstacleSpawn = 0;
            game.lastCoinSpawn = 0;
            game.lastPowerupSpawn = 0;
            game.frameCount = 0;
            game.isInvincible = false;
            game.isMagnetActive = false;
            game.speedLevel = 0;
            game.speedBoostFlash = 0;
            game.isHurt = false;
            game.lives = CONFIG.maxLives;
            game.isDying = false;
            game.isJumping = false;
            game.jumpFrame = 0;
            game.jumpHeight = 0;
            
            updateScore();
            updateLivesDisplay();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('powerupIndicator').classList.add('hidden');
            document.getElementById('magnetIndicator').classList.add('hidden');
            document.getElementById('invincibleBtn').classList.remove('active');
            document.getElementById('invincibleBtn').textContent = '🛡️ 无敌模式';
        }

        function togglePause() {
            if (game.state === 'playing') {
                game.state = 'paused';
                document.getElementById('pauseOverlay').classList.remove('hidden');
            } else if (game.state === 'paused') {
                game.state = 'playing';
                document.getElementById('pauseOverlay').classList.add('hidden');
            }
        }

        // ==================== 输入处理 ====================
        // 点击任意位置开始游戏（备用方案）
        document.addEventListener('click', () => {
            if (game.state === 'start' || game.state === 'gameover') {
                startGame();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (game.state === 'start' || game.state === 'gameover') {
                    startGame();
                    return;
                }
            }
            
            if (e.code === 'KeyP') {
                if (game.state === 'playing' || game.state === 'paused') {
                    togglePause();
                }
            }

            // 无敌快捷键 U
            if (e.code === 'KeyU') {
                togglePermInvincible();
            }
            
            if (game.state === 'playing') {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                    e.preventDefault();
                    if (game.targetLane > 0) {
                        game.targetLane--;
                    }
                }
                if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                    e.preventDefault();
                    if (game.targetLane < 2) {
                        game.targetLane++;
                    }
                }
            }
        });

        // ==================== 移动端触控 ====================
        // 防止页面滚动（只在游戏进行时阻止）
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('touchstart', (e) => {
            // 只在游戏进行中才阻止默认行为，开始/结束界面放行让 click 触发
            const isUI = e.target.closest('.invincible-btn') || e.target.closest('.mobile-btn') || 
                e.target.closest('#mobilePauseBtn');
            const isStartScreen = e.target.closest('#startScreen') || e.target.closest('#gameOverScreen');
            if (!isUI && !isStartScreen && game.state === 'playing') {
                e.preventDefault();
            }
        }, { passive: false });

        // 开始/结束界面直接绑定 touchstart 确保手机可用
        document.getElementById('startScreen').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (game.state === 'start') startGame();
        }, { passive: true });
        document.getElementById('gameOverScreen').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (game.state === 'gameover') startGame();
        }, { passive: true });

        // 左键
        const mobileLeft = document.getElementById('mobileLeft');
        const mobileRight = document.getElementById('mobileRight');
        const mobilePauseBtn = document.getElementById('mobilePauseBtn');

        function handleMoveLeft() {
            // 未开始时点击直接开始游戏
            if (game.state === 'start' || game.state === 'gameover') {
                startGame();
                return;
            }
            if (game.state === 'playing' && game.targetLane > 0) {
                game.targetLane--;
            }
        }
        function handleMoveRight() {
            // 未开始时点击直接开始游戏
            if (game.state === 'start' || game.state === 'gameover') {
                startGame();
                return;
            }
            if (game.state === 'playing' && game.targetLane < 2) {
                game.targetLane++;
            }
        }

        // 通用：触控+鼠标双支持，按住持续触发
        function bindControlBtn(btn, handler) {
            let holdTimer = null;

            // 触控 - 必须 preventDefault 防止误触发
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('pressed');
                handler();
                holdTimer = setInterval(handler, 280);
            }, { passive: false });

            const stopHold = () => {
                btn.classList.remove('pressed');
                clearInterval(holdTimer);
            };
            btn.addEventListener('touchend', stopHold, { passive: false });
            btn.addEventListener('touchcancel', stopHold);

            // 鼠标 fallback（模拟器 / PC 测试）
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                btn.classList.add('pressed');
                handler();
                holdTimer = setInterval(handler, 280);
                const up = () => {
                    stopHold();
                    document.removeEventListener('mouseup', up);
                };
                document.addEventListener('mouseup', up);
            });
        }

        bindControlBtn(mobileLeft, handleMoveLeft);
        bindControlBtn(mobileRight, handleMoveRight);

        // 暂停按钮（触控+鼠标）
        mobilePauseBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (game.state === 'playing' || game.state === 'paused') togglePause();
        }, { passive: false });
        mobilePauseBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (game.state === 'playing' || game.state === 'paused') togglePause();
        });

        // 滑动手势控制（在canvas区域）——必须 passive:false 才能 preventDefault
        let touchStartX = 0, touchStartY = 0, touchMoved = false;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchMoved = false;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) && !touchMoved) {
                touchMoved = true;
                if (game.state === 'playing') {
                    if (dx < 0) handleMoveLeft();
                    else handleMoveRight();
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // 短按（无滑动）：开始/重启游戏，放宽到 50px 容忍手指抖动
            if (dist < 50 && !touchMoved) {
                if (game.state === 'start' || game.state === 'gameover') {
                    startGame();
                }
            }
        }, { passive: false });

        // ==================== 游戏循环 ====================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 初始化
        updateScore();
        updateLivesDisplay();
        document.getElementById('highScoreDisplay').textContent = game.highScore;
        gameLoop();

        // ==================== 无敌切换函数 ====================
        function togglePermInvincible() {
            game.isPermInvincible = !game.isPermInvincible;
            const btn = document.getElementById('invincibleBtn');
            if (game.isPermInvincible) {
                btn.classList.add('active');
                btn.textContent = '⚡ 永久无敌 ⚡';
                game.isInvincible = true;
                document.getElementById('powerupIndicator').classList.remove('hidden');
                document.getElementById('powerupIndicator').textContent = '🛡️ 永久无敌 🛡️';
            } else {
                btn.classList.remove('active');
                btn.textContent = '🛡️ 无敌模式';
                if (!game.isHurt) {
                    game.isInvincible = false;
                    document.getElementById('powerupIndicator').classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
